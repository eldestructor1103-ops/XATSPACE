<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Xatspace - Jhojan</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:#000 url('https://xatimg.com/image/PJNEHGXnaO8T.jpg') center/cover fixed;
    color:white;
    min-height:100vh;
    overflow-x:hidden;
    position:relative;
}

.overlay{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(12px);
    z-index:1;
}

.rain{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:2;
}

.drop{
    position:absolute;
    width:2px;
    height:20px;
    background:rgba(255,255,255,.5);
    animation:rainFall linear infinite;
}

@keyframes rainFall{
    0%{
        transform:translateY(-100vh);
        opacity:0;
    }

    10%{
        opacity:1;
    }

    100%{
        transform:translateY(100vh);
        opacity:0;
    }
}

.container{
    position:relative;
    z-index:10;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.glass-card{
    width:95%;
    max-width:1200px;
    min-height:75vh;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(25px);
    border-radius:25px;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 25px 50px rgba(0,0,0,.5);
    display:flex;
    overflow:hidden;
}

.sidebar{
    width:300px;
    background:rgba(255,255,255,.03);
    border-right:1px solid rgba(255,255,255,.08);
    padding:25px;
}

.profile-section{
    text-align:center;
    margin-bottom:25px;
}

.profile-img{
    width:90px;
    height:90px;
    border-radius:50%;
    overflow:hidden;
    margin:auto auto 15px;
    border:2px solid rgba(255,255,255,.3);
}

.profile-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.username{
    font-family:'Dancing Script',cursive;
    font-size:34px;
}

.user-id{
    font-size:11px;
    color:rgba(255,255,255,.6);
}

.menu{
    display:flex;
    flex-direction:column;
    gap:10px;
}

.menu-btn{
    height:52px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.08);
    color:white;
    cursor:pointer;
    font-size:13px;
    letter-spacing:1px;
    transition:.3s;
}

.menu-btn:hover{
    background:rgba(255,255,255,.2);
}

.menu-btn.active{
    background:rgba(255,255,255,.25);
    box-shadow:0 0 20px rgba(255,255,255,.3);
}

.content-area{
    flex:1;
    padding:50px;
    overflow-y:auto;
}

.content-section{
    display:none;
}

.content-section.active{
    display:block;
}

.img-hover{
    height:150px;
    border-radius:15px;
    overflow:hidden;
    position:relative;
    transition:.3s;
}

.img-hover:hover{
    transform:scale(1.05);
}

.img-bg{
    position:absolute;
    inset:0;
    background-size:cover;
    background-position:center;
}

.friend-item{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px;
    background:rgba(255,255,255,.05);
    border-radius:12px;
    margin-bottom:12px;
}

.friend-avatar{
    width:55px;
    height:55px;
    border-radius:50%;
    overflow:hidden;
}

.friend-avatar img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.friend-country{
    display:flex;
    align-items:center;
    gap:8px;
    margin-top:5px;
    color:rgba(255,255,255,.7);
    font-size:13px;
}

.friend-country img{
    width:20px;
}

.music-player{
    max-width:500px;
    margin:auto;
    text-align:center;
}

.music-cover{
    width:220px;
    height:220px;
    border-radius:50%;
    margin:auto auto 30px;
    background-size:cover;
    background-position:center;
    border:4px solid rgba(255,255,255,.3);
    animation:rotateCover 20s linear infinite paused;
}

.music-cover.playing{
    animation-play-state:running;
}

@keyframes rotateCover{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

.music-controls{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:25px;
}

.control-btn{
    width:60px;
    height:60px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,.2);
    color:white;
    font-size:22px;
    cursor:pointer;
}

.control-btn:hover{
    background:rgba(255,255,255,.4);
}

#musicPlayer{
    display:none;
}

@media(max-width:768px){

    .glass-card{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .content-area{
        padding:20px;
    }

}

</style>
</head>

<body>

<div class="overlay"></div>

<div class="rain" id="rain"></div>

<div class="container">

<div class="glass-card">

<div class="sidebar">

<div class="profile-section">

<div class="profile-img">
<img src="https://xatimg.com/image/PJNEHGXnaO8T.jpg">
</div>

<div class="username">Jhojan</div>

<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;">

<div class="img-hover">
<div class="img-bg" style="background-image:url('https://xatimg.com/image/T1lHJlKsEeDR.jpg');"></div>

<div class="img-hover">

<div class="img-hover">
<div class="img-bg" style="background-image:url('https://xatimg.com/image/5qCcwD6W3mTj.jpg');"></div>
</div>

<div class="img-hover">
<div class="img-bg" style="background-image:url('https://xatimg.com/image/tys6XC9Oul6J.jpg');"></div>
</div>

<section id="friends" class="content-section">

<h2 style="font-size:32px;margin-bottom:30px;">
Amigos
</h2>

<div class="friend-item">

<div class="friend-avatar">
<img src="https://xatimg.com/image/D1VVfXg83TGW.png">
</div>

<div>

<h4>Rosii</h4>

<div class="friend-country">
<img src="https://flagcdn.com/w40/co.png">
Colombia
</div>

</div>

</div>

</section>

<section id="music" class="content-section">

<div class="music-player">

<div class="music-cover" id="musicCover"></div>

<div class="music-controls">

<button class="control-btn" id="prevBtn">⏮</button>

<button class="control-btn" id="playPauseBtn">▶</button>

<button class="control-btn" id="nextBtn">⏭</button>

</div>

<h3 id="songTitle"></h3>

<audio id="musicPlayer"></audio>

</div>

</section>

</main>

</div>

</div>

<script>

document.addEventListener('DOMContentLoaded',()=>{

const menuBtns=document.querySelectorAll('.menu-btn');
const sections=document.querySelectorAll('.content-section');

menuBtns.forEach(btn=>{

    btn.addEventListener('click',()=>{

        sections.forEach(sec=>{
            sec.classList.remove('active');
        });

        menuBtns.forEach(b=>{
            b.classList.remove('active');
        });

        document.getElementById(btn.dataset.target)
        .classList.add('active');

        btn.classList.add('active');

    });

});

const audio=document.getElementById('musicPlayer');
const playBtn=document.getElementById('playPauseBtn');
const prevBtn=document.getElementById('prevBtn');
const nextBtn=document.getElementById('nextBtn');
const cover=document.getElementById('musicCover');
const title=document.getElementById('songTitle');

const songs=[

{
    src:'StreetPoem.mp3',
    title:'Anuel AA - Street Poem',
    cover:'https://xatimg.com/image/ERP0zptxiilD.png'
},

{
    src:'Blessd.mp3',
    title:'Blessd',
    cover:'https://xatimg.com/image/T1lHJlKsEeDR.jpg'
},

{
    src:'BLESSDINSTAGRAM.mp3',
    title:'Instagram',
    cover:'https://xatimg.com/image/CQdC8EBk9t1d.jpg'
}

];

let currentSong=0;
let isPlaying=false;

function loadSong(index){

    audio.src=songs[index].src;

    title.textContent=songs[index].title;

    cover.style.backgroundImage=
    `url('${songs[index].cover}')`;

}

function playMusic(){

    audio.play();

    isPlaying=true;

    playBtn.textContent='⏸';

    cover.classList.add('playing');

}

function pauseMusic(){

    audio.pause();

    isPlaying=false;

    playBtn.textContent='▶';

    cover.classList.remove('playing');

}

playBtn.addEventListener('click',()=>{

    if(isPlaying){
        pauseMusic();
    }else{
        playMusic();
    }

});

nextBtn.addEventListener('click',()=>{

    currentSong=(currentSong+1)%songs.length;

    loadSong(currentSong);

    playMusic();

});

prevBtn.addEventListener('click',()=>{

    currentSong=(currentSong-1+songs.length)%songs.length;

    loadSong(currentSong);

    playMusic();

});

audio.addEventListener('ended',()=>{

    currentSong=(currentSong+1)%songs.length;

    loadSong(currentSong);

    playMusic();

});

loadSong(currentSong);

const rain=document.getElementById('rain');

for(let i=0;i<200;i++){

    const drop=document.createElement('div');

    drop.className='drop';

    drop.style.left=Math.random()*100+'%';

    drop.style.animationDuration=
    (Math.random()*1+.5)+'s';

    drop.style.animationDelay=
    Math.random()*2+'s';

    rain.appendChild(drop);

}

});

</script>

</body>
</html>
